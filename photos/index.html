<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Photos — Elisa &amp; Arden</title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Jost:wght@200;300;400;500&display=block"
    rel="stylesheet"
  />

  <style>
    /* ================================================================
       CUSTOM PROPERTIES
    ================================================================ */
    :root {
      --font-serif:        'Cormorant Garamond', serif;
      --font-sans:         'Jost', sans-serif;
      --font-script:       'Great Vibes', cursive;
      --color-brown:       #c8967a;
      --color-brown-dark:  #b07858;
      --color-black:       #1e1e1e;
      --color-bg:          #fdfbf9;
      --color-border:      #d4b8a8;
      --color-placeholder: #c8b8b0;
      --color-inactive:    #e0d0c8;
      --color-pastel-red:  #c0504a;
      --radius-sm:         4px;
      --shadow-card:       0 4px 24px rgba(0,0,0,0.18);
      --focus-ring:        0 0 0 2px rgba(200,150,122,0.15);
    }

    /* ================================================================
       RESET
    ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-black);
      overflow-x: hidden;
    }

    /* ================================================================
       SPINNER  (upload btn)
    ================================================================ */
    @keyframes btn-spin {
      to { transform: rotate(360deg); }
    }

    .btn-spinner {
      display: inline-block;
      width: 1.1em;
      height: 1.1em;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btn-spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ================================================================
       PAGE CONTENT
    ================================================================ */
    #page-content {
      min-height: 100svh;
      padding: 0 4rem 5rem;
    }

    @media (max-width: 480px) {
      #page-content { padding: 0 1.25rem 4rem; }
    }

    /* ================================================================
       HEADER
    ================================================================ */
    .photos-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 3rem 0 2.25rem;
      margin-bottom: 0;
    }

    .photos-header .t-display {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(3.5rem, 13vw, 11rem);
      letter-spacing: 0.12em;
      color: var(--color-brown);
      line-height: 0.95;
    }

    .photos-header .t-names {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: clamp(1.6rem, 5.2vw, 3.6rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-black);
      margin-top: 0.5rem;
    }

    .photos-header .t-body {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      letter-spacing: 0.06em;
      color: var(--color-brown-dark);
      margin-top: 0.75rem;
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .upload-btn {
      width: min(12rem, 42vw);
      height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-bg);
      background: var(--color-brown);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      touch-action: manipulation;
    }

    .upload-btn:hover:not(:disabled):not(.is-waiting) { background: var(--color-brown-dark); }
    .upload-btn:disabled {
      cursor: default;
      background: var(--color-brown);
      color: var(--color-bg);
      -webkit-text-fill-color: var(--color-bg);
      opacity: 1;
    }
    .upload-btn.is-waiting {
      background: var(--color-inactive);
      cursor: default;
      pointer-events: none;
    }
    .upload-btn { -webkit-tap-highlight-color: transparent; }

    /* ================================================================
       PHOTO GRID
    ================================================================ */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
    }

    .photo-grid__item {
      aspect-ratio: 1 / 1;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      background: var(--color-inactive);
    }

    .photo-grid__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .photo-grid__item:hover img {
      transform: scale(1.03);
    }

    /* Skeleton loader while image loads */
    .photo-grid__item.is-loading {
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }

    @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ================================================================
       EMPTY STATE
    ================================================================ */
    .photos-empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 5rem 0;
      text-align: center;
    }

    .photos-empty__heading {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--color-brown);
      letter-spacing: 0.04em;
    }

    .photos-empty__body {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      color: var(--color-brown-dark);
      max-width: 28rem;
      line-height: 1.6;
    }

    /* ================================================================
       UPLOAD STATUS
    ================================================================ */
    .upload-status {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      letter-spacing: 0.06em;
      color: var(--color-brown-dark);
      text-align: center;
      margin-top: 0.75rem;
    }

    .upload-status--error {
      color: var(--color-pastel-red);
    }

    /* ================================================================
       LIGHTBOX
    ================================================================ */
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 8888;
      background: rgba(20, 15, 10, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #lightbox.is-open {
      opacity: 1;
      pointer-events: all;
    }

    #lightbox__img {
      max-width: 90vw;
      max-height: 90svh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      display: block;
    }

    #lightbox__close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      font-family: var(--font-sans);
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s;
    }

    #lightbox__close:hover { background: rgba(255,255,255,0.22); }

    #lightbox__prev,
    #lightbox__next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 3rem;
      height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
    }

    #lightbox__prev { left: 1.5rem; }
    #lightbox__next { right: 1.5rem; }
    #lightbox__prev:hover, #lightbox__next:hover { background: rgba(255,255,255,0.22); }

    @media (max-width: 480px) {
      #lightbox__prev { left: 0.5rem; }
      #lightbox__next { right: 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- Config -->
  <div id="config"
       data-supabase-url="https://fnxhwhxnhhdezyrchkpi.supabase.co"
       data-supabase-key="sb_publishable_pQUCD_gSk5iq0dpgixEIxQ_wqggxSyB">
  </div>

  <!-- ============================================================
       PAGE CONTENT
  ============================================================ -->
  <div id="page-content">

    <header class="photos-header">
      <p class="t-display">Photos</p>
      <p class="t-names">Elisa &amp; Arden</p>
      <p class="t-body">Please share your photos with us</p>
      <div class="header-actions">
        <button class="upload-btn" id="add-photos-btn" type="button">Upload Photos</button>
        <button class="upload-btn" id="camera-btn" type="button">Take a Photo</button>
      </div>
      <p class="upload-status" id="upload-status" aria-live="polite"></p>
    </header>

    <div class="photo-grid" id="photo-grid">
      <!-- Photos injected here by JS -->
    </div>

  </div><!-- /page-content -->

  <!-- ============================================================
       LIGHTBOX
  ============================================================ -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button id="lightbox__close" aria-label="Close">&#x2715;</button>
    <button id="lightbox__prev" aria-label="Previous photo">
      <svg width="11" height="18" viewBox="0 0 11 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 2L2 9L9 16" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <img id="lightbox__img" src="" alt="" />
    <button id="lightbox__next" aria-label="Next photo">
      <svg width="11" height="18" viewBox="0 0 11 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2L9 9L2 16" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="image/*" multiple hidden />

  <script>
    /* ================================================================
       CONFIG
    ================================================================ */
    const cfg     = document.getElementById('config');
    const SB_URL  = cfg.dataset.supabaseUrl;
    const SB_KEY  = cfg.dataset.supabaseKey;
    const BUCKET  = 'wedding-photos';

    loadPhotos();

    /* ================================================================
       PHOTO GRID
    ================================================================ */
    function loadPhotos() {
      fetch(SB_URL + '/rest/v1/photos?order=uploaded_at.desc&select=id,url,filename', {
        headers: {
          'apikey':        SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY
        }
      })
      .then(function (res) { return res.json(); })
      .then(function (photos) {
        var grid = document.getElementById('photo-grid');
        if (!photos || photos.length === 0) {
          renderEmpty(grid);
        } else {
          photos.forEach(function (p) { grid.appendChild(makeCard(p.url, p.filename)); });
        }
      })
      .catch(function () {
        renderEmpty(document.getElementById('photo-grid'));
      });
    }

    function makeCard(url, alt) {
      var item = document.createElement('div');
      item.className = 'photo-grid__item is-loading';
      var img = document.createElement('img');
      img.alt = alt || 'Wedding photo';
      img.src = url;
      img.addEventListener('load',  function () { item.classList.remove('is-loading'); });
      img.addEventListener('error', function () { item.remove(); });
      img.addEventListener('click', function () { openLightbox(url); });
      item.appendChild(img);
      return item;
    }

    function renderEmpty(grid) {
      grid.innerHTML =
        '<div class="photos-empty">' +
          '<p class="photos-empty__heading">Coming Soon</p>' +
          '<p class="photos-empty__body">Photos will appear here after the wedding. Check back soon.</p>' +
        '</div>';
    }

    /* ================================================================
       LIGHTBOX + CAROUSEL
    ================================================================ */
    var lightbox      = document.getElementById('lightbox');
    var lightboxImg   = document.getElementById('lightbox__img');
    var lightboxClose = document.getElementById('lightbox__close');
    var lightboxPrev  = document.getElementById('lightbox__prev');
    var lightboxNext  = document.getElementById('lightbox__next');
    var carouselUrls  = [];
    var carouselIdx   = 0;

    function openLightbox(url) {
      var imgs = Array.from(document.querySelectorAll('.photo-grid__item img'));
      carouselUrls = imgs.map(function (img) { return img.src; });
      carouselIdx  = carouselUrls.indexOf(url);
      if (carouselIdx < 0) carouselIdx = 0;
      lightboxImg.src = carouselUrls[carouselIdx];
      lightbox.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function showSlide(idx) {
      carouselIdx = (idx + carouselUrls.length) % carouselUrls.length;
      lightboxImg.src = carouselUrls[carouselIdx];
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      document.body.style.overflow = '';
      lightboxImg.src = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', function () { showSlide(carouselIdx - 1); });
    lightboxNext.addEventListener('click', function () { showSlide(carouselIdx + 1); });

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox || e.target === lightboxImg) closeLightbox();
    });

    document.addEventListener('keydown', function (e) {
      if (!lightbox.classList.contains('is-open')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   showSlide(carouselIdx - 1);
      if (e.key === 'ArrowRight')  showSlide(carouselIdx + 1);
    });

    /* Swipe support */
    var swipeStartX = 0;
    lightbox.addEventListener('touchstart', function (e) {
      swipeStartX = e.touches[0].clientX;
    }, { passive: true });
    lightbox.addEventListener('touchend', function (e) {
      var dx = e.changedTouches[0].clientX - swipeStartX;
      if (Math.abs(dx) > 50) showSlide(dx < 0 ? carouselIdx + 1 : carouselIdx - 1);
    }, { passive: true });

    /* ================================================================
       UPLOAD
    ================================================================ */
    var addBtn    = document.getElementById('add-photos-btn');
    var cameraBtn = document.getElementById('camera-btn');
    var fileInput = document.getElementById('file-input');
    var statusEl  = document.getElementById('upload-status');
    var activeBtn = null;

    addBtn.addEventListener('click', function () {
      activeBtn = addBtn;
      fileInput.value = '';
      fileInput.click();
    });

    cameraBtn.addEventListener('click', function () {
      activeBtn = cameraBtn;
      var cameraInput = document.createElement('input');
      cameraInput.type    = 'file';
      cameraInput.accept  = 'image/*';
      cameraInput.capture = 'environment';
      cameraInput.addEventListener('change', function () {
        var files = Array.from(cameraInput.files);
        if (!files.length) return;
        uploadFiles(files);
      });
      cameraInput.click();
    });

    fileInput.addEventListener('change', function () {
      var files = Array.from(fileInput.files);
      if (!files.length) return;
      if (files.length > 20) {
        setStatus('Max 20 photos per upload — please select fewer', true);
        return;
      }
      uploadFiles(files);
    });

    function uploadFiles(files) {
      var waitingBtn = (activeBtn === addBtn) ? cameraBtn : addBtn;
      if (activeBtn) {
        activeBtn.disabled = true;
        activeBtn.innerHTML = '<span class="btn-spinner" aria-label="Uploading\u2026"></span>';
      }
      waitingBtn.classList.add('is-waiting');
      setStatus('');

      var grid    = document.getElementById('photo-grid');
      var empty   = grid.querySelector('.photos-empty');
      var done    = 0;
      var failed  = 0;
      var total   = files.length;

      files.forEach(function (file) {
        var ext  = file.name.split('.').pop() || 'jpg';
        var path = Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;

        fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + path, {
          method: 'POST',
          headers: {
            'apikey':        SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY,
            'Content-Type':  file.type || 'image/jpeg',
            'x-upsert':      'false'
          },
          body: file
        })
        .then(function (res) {
          if (!res.ok) throw new Error('Storage upload failed: ' + res.status);
          var publicUrl = SB_URL + '/storage/v1/object/public/' + BUCKET + '/' + path;
          return fetch(SB_URL + '/rest/v1/photos', {
            method: 'POST',
            headers: {
              'apikey':        SB_KEY,
              'Authorization': 'Bearer ' + SB_KEY,
              'Content-Type':  'application/json',
              'Prefer':        'return=representation'
            },
            body: JSON.stringify({ storage_path: path, url: publicUrl, filename: file.name })
          }).then(function (r) {
            if (!r.ok) throw new Error('DB insert failed: ' + r.status);
            return publicUrl;
          });
        })
        .then(function (url) {
          done++;
          if (empty) { empty.remove(); empty = null; }
          var card = makeCard(url, file.name);
          grid.insertBefore(card, grid.firstChild);
          checkDone();
        })
        .catch(function () {
          failed++;
          checkDone();
        });
      });

      function checkDone() {
        if (done + failed < total) return;
        resetAddBtn();
        if (failed === 0) {
          setStatus(total === 1 ? 'Photo added' : total + ' photos added');
        } else if (done === 0) {
          setStatus('Upload failed. Please try again', true);
        } else {
          setStatus(done + ' of ' + total + ' photos uploaded, ' + failed + ' failed', true);
        }
      }
    }

    function resetAddBtn() {
      addBtn.disabled    = false;
      cameraBtn.disabled = false;
      addBtn.classList.remove('is-waiting');
      cameraBtn.classList.remove('is-waiting');
      addBtn.innerHTML    = 'Upload Photos';
      cameraBtn.innerHTML = 'Take a Photo';
      activeBtn = null;
    }

    var statusTimer = null;
    function setStatus(msg, isError) {
      clearTimeout(statusTimer);
      statusEl.textContent = msg;
      statusEl.className   = 'upload-status' + (isError ? ' upload-status--error' : '');
      if (msg && !isError) {
        statusTimer = setTimeout(function () {
          statusEl.textContent = '';
          statusEl.className   = 'upload-status';
        }, 3000);
      }
    }
  </script>
</body>
</html>
